<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Home</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600&family=Manrope:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #f3efe8;
      --text: #1f2937;
      --muted: #4b5563;
      --card: #ffffff;
      --line: #e5e7eb;
      --brand: #0f766e;
      --brand-strong: #115e59;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: "Manrope", "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(800px 320px at 12% 0%, #ffe7c4 0%, rgba(255, 231, 196, 0) 70%),
        radial-gradient(900px 380px at 100% 10%, #c2eee9 0%, rgba(194, 238, 233, 0) 62%),
        var(--bg);
    }

    .card {
      width: min(560px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 20px;
      box-shadow: 0 18px 40px rgba(15, 23, 42, 0.12);
      padding: clamp(22px, 5vw, 36px);
      text-align: center;
    }

    h1 {
      margin: 0 0 12px;
      font-family: "Fraunces", Georgia, serif;
      font-size: clamp(2rem, 6vw, 2.8rem);
      line-height: 1.15;
    }

    p {
      margin: 0 0 22px;
      color: var(--muted);
      line-height: 1.6;
    }

    a {
      display: inline-block;
      text-decoration: none;
      background: var(--brand);
      color: #fff;
      font-weight: 600;
      padding: 10px 16px;
      border-radius: 12px;
      transition: background 0.2s ease, transform 0.2s ease;
    }

    a:hover {
      background: var(--brand-strong);
      transform: translateY(-1px);
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Welcome</h1>
    <p>A clean starting page for your Go web server.</p>
    <a href="/static/form.html">Open Form</a>
  </main>
</body>
</html>
